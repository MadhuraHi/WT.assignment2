<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillConnect | Tech-Network</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --neon-blue: #00e5ff;
            --neon-purple: #7000ff;
            --text-main: #ffffff;
            --border-color: #262626;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Techy Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--card-bg);
            border-right: 2px solid var(--border-color);
            padding: 2.5rem 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--neon-blue);
            margin-bottom: 3rem;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 40px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 40px;
            border-bottom: 4px solid var(--neon-purple);
            display: inline-block;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Bold Tech Card */
        .tech-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 24px;
            position: relative;
            transition: all 0.2s ease;
        }

        .tech-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .tech-card h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            margin: 0 0 10px 0;
        }

        .specialization {
            color: #888;
            font-weight: 600;
            margin-bottom: 20px;
            display: block;
        }

        /* Neon Tags */
        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .tag {
            background: #000;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Bold Action Button */
        .action-btn {
            background-color: var(--neon-blue);
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            text-transform: uppercase;
        }

        .action-btn:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">_SKILL.NET</div>
        <div style="font-size: 12px; color: #555;">[ SYSTEM STATUS: ONLINE ]</div>
        <br><br>
        <div style="cursor: pointer; color: var(--neon-blue);">// DASHBOARD</div>
        <br>
        <div style="cursor: pointer;">// PROFESSORS</div>
        <br>
        <div style="cursor: pointer;">// CONNECTIONS</div>
    </nav>

    <main class="main-content">
        <h1>DIRECTORY_ACCESS</h1>
        
        <div class="dashboard-grid">
            <div class="tech-card">
                <h3>DR. NARESH S.</h3>
                <span class="specialization">SYSTEMS ARCHITECTURE</span>
                <div class="skill-list">
                    <div class="tag">NEO4J</div>
                    <div class="tag">MONGODB</div>
                    <div class="tag">DISTRIBUTED_SYSTEMS</div>
                </div>
                <button class="action-btn">ESTABLISH CONNECTION</button>
            </div>

            </div>
    </main>

</body>
</html>

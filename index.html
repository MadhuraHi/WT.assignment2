<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registry</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: #1e1e1e; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; }
        h2 { text-align: center; margin-bottom: 25px; color: #00d2ff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 6px; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00d2ff; border: none; border-radius: 6px; color: #121212; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #0095b3; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registry</h2>
    <form id="regForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="College Email" required>
        <input type="text" id="skill" placeholder="Primary Skill (e.g. IoT, Java)" required>
        <button type="submit">Register Student</button>
    </form>
</div>

<script>
    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const data = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            skill: document.getElementById('skill').value
        };

        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const msg = await response.text();
            alert(msg);
            if(response.ok) document.getElementById('regForm').reset();
        } catch (err) {
            alert("Connection to server failed. Make sure server.js is running.");
        }
    });
</script>

</body>
</html>

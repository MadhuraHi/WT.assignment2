<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKILL.NET | V1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --neon: #00ff41; --accent: #ff003c; --text: #fff; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; border-right: 3px solid var(--border); padding: 40px 20px; font-family: 'JetBrains Mono'; display: flex; flex-direction: column; }
        .logo { font-size: 24px; color: var(--neon); margin-bottom: 50px; letter-spacing: -1px; }
        
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        h1 { font-size: 50px; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; border-left: 10px solid var(--neon); padding-left: 20px; }

        /* Tech Form Styling */
        .registration-box { background: var(--card); border: 2px solid var(--neon); padding: 30px; margin-bottom: 50px; max-width: 600px; }
        .registration-box h2 { font-family: 'JetBrains Mono'; color: var(--neon); margin-top: 0; font-size: 18px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; width: 100%; margin: 10px 0; box-sizing: border-box; font-family: 'JetBrains Mono'; }
        input:focus { border-color: var(--neon); outline: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .tech-card { background: var(--card); border: 4px solid var(--border); padding: 25px; transition: 0.3s; }
        .tech-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        
        .name { font-family: 'JetBrains Mono'; font-size: 22px; text-transform: uppercase; color: var(--neon); }
        .tag { border: 1px solid var(--neon); padding: 3px 8px; font-size: 10px; font-family: 'JetBrains Mono'; margin-right: 5px; color: var(--neon); }
        
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-family: 'JetBrains Mono'; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ROOT@SKILL.NET</div>
        <div style="color: #444; font-size: 12px;">// SYS_STATUS: ACTIVE</div>
    </div>

    <div class="main">
        <h1>NETWORK_REGISTRY</h1>

        <div class="registration-box">
            <h2>// NEW_USER_INITIALIZATION</h2>
            <input type="text" id="regName" placeholder="ENTER_NAME">
            <input type="text" id="regRole" placeholder="ENTER_ROLE (e.g. STUDENT / PROFESSOR)">
            <input type="text" id="regSkill" placeholder="PRIMARY_SKILL">
            <button class="btn" onclick="register()">INITIALIZE_NODE</button>
        </div>

        <h1>DIRECTORY_LIST</h1>
        <div class="grid" id="prof-container"></div>
    </div>

    <script>
        async function register() {
            const name = document.getElementById('regName').value;
            const role = document.getElementById('regRole').value;
            const skill = document.getElementById('regSkill').value;

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, role, skill })
            });
            
            if (res.ok) {
                alert("NODE_CREATED: Welcome to the network.");
                location.reload();
            }
        }

        async function loadEntities() {
            const res = await fetch('/api/entities');
            const data = await res.json();
            document.getElementById('prof-container').innerHTML = data.map(e => `
                <div class="tech-card">
                    <div class="name">${e.name}</div>
                    <div style="font-size: 11px; color: #666; margin-bottom: 15px;">ROLE: ${e.title}</div>
                    <div class="tags">${e.skills.map(s => `<span class="tag">${s}</span>`).join('')}</div>
                    <button class="btn" style="padding: 10px; font-size: 12px;">ESTABLISH_LINK</button>
                </div>
            `).join('');
        }
        loadEntities();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKILL.NET | V1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --neon: #00ff41; --accent: #ff003c; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; border-right: 3px solid #222; padding: 40px 20px; font-family: 'JetBrains Mono'; display: flex; flex-direction: column; }
        .logo { font-size: 24px; color: var(--neon); margin-bottom: 50px; letter-spacing: -1px; }
        .nav-item { margin: 15px 0; color: #555; cursor: pointer; transition: 0.2s; font-size: 13px; text-transform: uppercase; }
        .nav-item:hover { color: var(--neon); }

        .main { flex: 1; padding: 60px; overflow-y: auto; }
        h1 { font-size: 60px; font-weight: 900; margin: 0 0 40px 0; letter-spacing: -3px; text-transform: uppercase; border-left: 10px solid var(--neon); padding-left: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .tech-card { background: var(--card); border: 4px solid #222; padding: 30px; transition: 0.3s; position: relative; }
        .tech-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        
        .name { font-family: 'JetBrains Mono'; font-size: 24px; margin-bottom: 5px; text-transform: uppercase; color: var(--text); }
        .role { color: #888; font-weight: 700; font-size: 11px; margin-bottom: 20px; display: block; letter-spacing: 2px; }
        
        .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .tag { border: 1px solid var(--neon); padding: 4px 12px; font-size: 10px; font-family: 'JetBrains Mono'; color: var(--neon); background: rgba(0, 255, 65, 0.05); }
        
        .connect-btn { background: var(--neon); color: var(--bg); border: none; padding: 15px; width: 100%; 
                      font-family: 'JetBrains Mono'; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .connect-btn:hover { background: #fff; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ROOT@SKILL.NET</div>
        <div class="nav-item">// ACCESS_DIRECTORY</div>
        <div class="nav-item">// SKILL_NODES</div>
        <div class="nav-item">// NETWORK_GRAPH</div>
        <div style="margin-top: auto; color: #333; font-size: 10px;">V1.0.4_STABLE</div>
    </div>

    <div class="main">
        <h1>DIRECTORY_LIST</h1>
        <div class="grid" id="prof-container">
            </div>
    </div>

    <script>
        async function loadEntities() {
            try {
                const res = await fetch('/api/entities');
                const entities = await res.json();
                const container = document.getElementById('prof-container');
                
                container.innerHTML = entities.map(e => `
                    <div class="tech-card">
                        <div class="name">${e.name}</div>
                        <span class="role">${e.title}</span>
                        <div class="tags">
                            ${e.skills.map(s => `<div class="tag">${s}</div>`).join('')}
                        </div>
                        <button class="connect-btn" onclick="establishConnection('${e.name}')">Establish_Link</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Failed to load directory:", err);
            }
        }

        async function establishConnection(targetName) {
            const userName = "Madhura"; 
            const res = await fetch('/api/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userName, targetName })
            });
            const msg = await res.text();
            alert("SYSTEM_RESPONSE: " + msg);
        }

        loadEntities();
    </script>
</body>
</html>
